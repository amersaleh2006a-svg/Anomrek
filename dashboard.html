<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>داشبورد — عَن عُمْرِك</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#1a2744;--navy-deep:#111c36;--navy-light:#243560;
  --cream:#f5f0e8;--cream-light:#faf7f2;
  --gold:#c9a84c;--gold-light:#e8c97a;
  --text-dark:#1a2744;--text-muted:#7a8aaa;
  --card:#fff;--error:#e53e3e;--success:#38a169;
}
body{font-family:'Cairo',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;padding-bottom:80px}

/* HEADER */
header{background:var(--navy-deep);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;border-bottom:2px solid rgba(201,168,76,.3)}
.back-btn{color:rgba(255,255,255,.7);text-decoration:none;font-size:.85rem;display:flex;align-items:center;gap:6px;transition:color .2s}
.back-btn:hover{color:var(--gold)}
.header-title{font-family:'Amiri',serif;color:white;font-size:1.2rem}
.edit-btn{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);color:var(--gold);padding:6px 14px;border-radius:10px;font-family:'Cairo',sans-serif;font-size:.78rem;cursor:pointer;transition:all .2s}
.edit-btn:hover{background:rgba(201,168,76,.25)}

/* MAIN */
.main{max-width:680px;margin:0 auto;padding:24px 16px}

/* PROFILE CARD */
.profile-card{background:var(--navy);border-radius:20px;padding:28px 24px;margin-bottom:20px;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(17,28,54,.3)}
.profile-card::before{content:'';position:absolute;top:-40px;left:-40px;width:200px;height:200px;border-radius:50%;background:rgba(201,168,76,.06);pointer-events:none}
.profile-top{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.avatar-wrap{position:relative;flex-shrink:0}
.avatar{width:72px;height:72px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:700;color:var(--navy-deep);border:3px solid rgba(201,168,76,.4);overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar-edit{position:absolute;bottom:0;right:0;width:22px;height:22px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;cursor:pointer;border:2px solid var(--navy)}
.profile-info{flex:1;min-width:0}
.profile-name{font-family:'Amiri',serif;font-size:1.4rem;color:white;margin-bottom:4px}
.profile-email{font-size:.75rem;color:rgba(255,255,255,.5);direction:ltr;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.profile-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.tag{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.25);color:var(--gold-light);padding:3px 10px;border-radius:12px;font-size:.7rem}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(255,255,255,.08);border-radius:14px;overflow:hidden}
.stat-item{background:rgba(255,255,255,.05);padding:14px 10px;text-align:center}
.stat-num{font-size:1.6rem;font-weight:700;color:var(--gold-light);line-height:1}
.stat-label{font-size:.65rem;color:rgba(255,255,255,.5);margin-top:4px}

/* SECTIONS */
.section{background:var(--card);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 12px rgba(26,39,68,.07)}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:'Amiri',serif;font-size:1.05rem;color:var(--navy)}
.section-action{font-size:.75rem;color:var(--gold);cursor:pointer;text-decoration:none}

/* EDIT FORM */
.edit-form{display:none}
.edit-form.open{display:block}
.field-group{margin-bottom:14px}
.field-group label{display:block;font-size:.75rem;font-weight:600;color:var(--navy);margin-bottom:5px}
.field-group input,.field-group select{width:100%;padding:10px 12px;border:1.5px solid rgba(26,39,68,.15);border-radius:10px;font-family:'Cairo',sans-serif;font-size:.85rem;color:var(--navy);background:var(--cream-light);outline:none;transition:border-color .2s}
.field-group input:focus,.field-group select:focus{border-color:var(--gold)}
.save-btn{width:100%;padding:11px;background:var(--navy);color:white;border:none;border-radius:10px;font-family:'Cairo',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;transition:background .2s}
.save-btn:hover{background:var(--navy-light)}
.msg-box{padding:10px 14px;border-radius:10px;font-size:.8rem;margin-bottom:12px;display:none}
.msg-box.success{background:rgba(56,161,105,.08);color:var(--success);border:1px solid rgba(56,161,105,.2);display:block}
.msg-box.error{background:rgba(229,62,62,.08);color:var(--error);border:1px solid rgba(229,62,62,.2);display:block}

/* ACTIVITY */
.activity-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.act-day{aspect-ratio:1;border-radius:4px;background:rgba(26,39,68,.08)}
.act-day.active{background:var(--gold)}
.act-day.mid{background:rgba(201,168,76,.4)}
.act-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:.65rem;color:var(--text-muted)}

/* TODO PREVIEW */
.todo-preview-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(26,39,68,.06)}
.todo-preview-item:last-child{border-bottom:none}
.todo-check-icon{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem}
.todo-check-icon.done{background:var(--gold);color:white}
.todo-check-icon.pending{border:2px solid rgba(26,39,68,.2)}
.todo-preview-text{font-size:.85rem;color:var(--text-dark);flex:1}
.todo-preview-text.done{text-decoration:line-through;color:var(--text-muted)}
.empty-todos{text-align:center;padding:20px;color:var(--text-muted);font-family:'Amiri',serif}

/* LOGOUT */
.logout-btn{width:100%;padding:12px;background:rgba(229,62,62,.08);color:var(--error);border:1px solid rgba(229,62,62,.2);border-radius:12px;font-family:'Cairo',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:8px}
.logout-btn:hover{background:rgba(229,62,62,.15)}

/* LOADING */
#loadingScreen{position:fixed;inset:0;background:var(--navy-deep);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100}
#loadingScreen .logo{font-family:'Amiri',serif;color:var(--gold);font-size:2rem;margin-bottom:12px}
#loadingScreen .spinner{width:32px;height:32px;border:3px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .4s ease}
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="logo">عَن عُمْرِك</div>
  <div class="spinner"></div>
</div>

<div id="dashContent" style="display:none;">

<header>
  <a class="back-btn" href="index.html">← الموقع</a>
  <div class="header-title">ملفي الشخصي</div>
  <button class="edit-btn" onclick="toggleEditForm()">تعديل ✏️</button>
</header>

<div class="main">

  <!-- PROFILE CARD -->
  <div class="profile-card fade-in">
    <div class="profile-top">
      <div class="avatar-wrap">
        <div class="avatar" id="userAvatar">؟</div>
        <div class="avatar-edit" title="تغيير الصورة">📷</div>
      </div>
      <div class="profile-info">
        <div class="profile-name" id="userName">جاري التحميل...</div>
        <div class="profile-email" id="userEmail"></div>
        <div class="profile-tags">
          <span class="tag" id="uniTag" style="display:none"></span>
          <span class="tag" id="majorTag" style="display:none"></span>
          <span class="tag" id="yearTag" style="display:none"></span>
        </div>
      </div>
    </div>
    <div class="stats-row">
      <div class="stat-item">
        <div class="stat-num" id="statSessions">0</div>
        <div class="stat-label">🍅 جلسات مذاكرة</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="statTodos">0</div>
        <div class="stat-label">✅ مهام منجزة</div>
      </div>
      <div class="stat-item">
        <div class="stat-num" id="statStreak">0</div>
        <div class="stat-label">🔥 أيام متواصلة</div>
      </div>
    </div>
  </div>

  <!-- EDIT FORM -->
  <div class="section fade-in" id="editSection" style="display:none;">
    <div class="section-head">
      <div class="section-title">تعديل المعلومات</div>
    </div>
    <div id="editMsg" class="msg-box"></div>
    <div class="field-group">
      <label>الاسم الكامل</label>
      <input id="editName" type="text" placeholder="اسمك الكامل">
    </div>
    <div class="field-group">
      <label>الجامعة</label>
      <input id="editUni" type="text" placeholder="جامعة دمشق">
    </div>
    <div class="field-group">
      <label>التخصص</label>
      <input id="editMajor" type="text" placeholder="طب الأسنان">
    </div>
    <div class="field-group">
      <label>السنة الدراسية</label>
      <select id="editYear">
        <option value="">اختر السنة</option>
        <option value="السنة الأولى">السنة الأولى</option>
        <option value="السنة الثانية">السنة الثانية</option>
        <option value="السنة الثالثة">السنة الثالثة</option>
        <option value="السنة الرابعة">السنة الرابعة</option>
        <option value="السنة الخامسة">السنة الخامسة</option>
        <option value="السنة السادسة">السنة السادسة</option>
      </select>
    </div>
    <button class="save-btn" onclick="saveProfile()">حفظ التعديلات ←</button>
  </div>

  <!-- ACTIVITY HEATMAP -->
  <div class="section fade-in">
    <div class="section-head">
      <div class="section-title">نشاط المذاكرة</div>
      <span style="font-size:.72rem;color:var(--text-muted)">آخر 4 أسابيع</span>
    </div>
    <div class="activity-grid" id="activityGrid"></div>
    <div class="act-labels">
      <span>الأسبوع الأول</span>
      <span>الثاني</span>
      <span>الثالث</span>
      <span>الرابع</span>
    </div>
  </div>

  <!-- TODOS PREVIEW -->
  <div class="section fade-in">
    <div class="section-head">
      <div class="section-title">المهام الحالية 📋</div>
      <a class="section-action" href="index.html">عرض الكل</a>
    </div>
    <div id="todosPreview"><div class="empty-todos">لا توجد مهام</div></div>
  </div>

  <!-- LOGOUT -->
  <button class="logout-btn" onclick="doLogout()">تسجيل الخروج</button>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

const app  = initializeApp({
  apiKey: "AIzaSyCGQH8ifVKgRpsN-sqVaC7VqV4RpucCT1c",
  authDomain: "anomrek.firebaseapp.com",
  projectId: "anomrek",
  storageBucket: "anomrek.firebasestorage.app",
  messagingSenderId: "617738540912",
  appId: "1:617738540912:web:39f51da06b684c5181e1b5"
});
const auth = getAuth(app);
const db   = getFirestore(app);
let currentUser = null;
let userData = {};

onAuthStateChanged(auth, async (user) => {
  if (!user) { window.location.href = 'login.html'; return; }
  currentUser = user;
  await loadUserData(user);
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('dashContent').style.display = 'block';
});

async function loadUserData(user) {
  try {
    const snap = await getDoc(doc(db, 'users', user.uid));
    userData = snap.exists() ? snap.data() : {};
  } catch(e) { userData = {}; }

  const name   = userData.name  || user.displayName || 'طالب';
  const email  = user.email || user.phoneNumber || '';
  const stats  = userData.stats || {};
  const todos  = userData.todos || JSON.parse(localStorage.getItem('anomerk_todos') || '[]');
  const streak = parseInt(localStorage.getItem('studyStreak') || stats.streakDays || 0);

  // Avatar
  const av = document.getElementById('userAvatar');
  if (user.photoURL) {
    av.innerHTML = `<img src="${user.photoURL}" alt="avatar">`;
  } else {
    av.textContent = name.charAt(0).toUpperCase();
  }

  document.getElementById('userName').textContent  = name;
  document.getElementById('userEmail').textContent = email;
  document.getElementById('statSessions').textContent = stats.pomodoroSessions || localStorage.getItem('studyStreak') || 0;
  document.getElementById('statTodos').textContent    = todos.filter(t => t.done).length;
  document.getElementById('statStreak').textContent   = streak;

  // Tags
  if (userData.university) { const t=document.getElementById('uniTag'); t.textContent='🏛 '+userData.university; t.style.display='inline'; }
  if (userData.major)      { const t=document.getElementById('majorTag'); t.textContent='📚 '+userData.major; t.style.display='inline'; }
  if (userData.year)       { const t=document.getElementById('yearTag'); t.textContent='📅 '+userData.year; t.style.display='inline'; }

  // Edit form prefill
  document.getElementById('editName').value  = name;
  document.getElementById('editUni').value   = userData.university || '';
  document.getElementById('editMajor').value = userData.major || '';
  document.getElementById('editYear').value  = userData.year  || '';

  // Activity heatmap (28 days)
  const grid = document.getElementById('activityGrid');
  grid.innerHTML = '';
  const sessions = stats.pomodoroSessions || 0;
  for (let i = 0; i < 28; i++) {
    const d = document.createElement('div');
    d.className = 'act-day';
    const r = Math.random();
    if (sessions > 20 && r > 0.4) d.className += ' active';
    else if (sessions > 5 && r > 0.6) d.className += ' mid';
    grid.appendChild(d);
  }

  // Todos preview (latest 5)
  const tp = document.getElementById('todosPreview');
  const latest = todos.slice(0, 5);
  if (latest.length === 0) {
    tp.innerHTML = '<div class="empty-todos">أضف مهامك من صفحة الأدوات 📋</div>';
  } else {
    tp.innerHTML = latest.map(t => `
      <div class="todo-preview-item">
        <div class="todo-check-icon ${t.done ? 'done' : 'pending'}">${t.done ? '✓' : ''}</div>
        <div class="todo-preview-text ${t.done ? 'done' : ''}">${t.text}</div>
      </div>`).join('');
  }
}

window.toggleEditForm = function() {
  const s = document.getElementById('editSection');
  s.style.display = s.style.display === 'none' ? 'block' : 'none';
};

window.saveProfile = async function() {
  const name  = document.getElementById('editName').value.trim();
  const uni   = document.getElementById('editUni').value.trim();
  const major = document.getElementById('editMajor').value.trim();
  const year  = document.getElementById('editYear').value;
  const msg   = document.getElementById('editMsg');

  if (!name) { msg.className='msg-box error'; msg.textContent='⚠ الاسم مطلوب'; return; }

  try {
    await updateDoc(doc(db, 'users', currentUser.uid), {
      name, university: uni, major, year,
      updatedAt: serverTimestamp()
    });
    msg.className = 'msg-box success';
    msg.textContent = '✓ تم الحفظ بنجاح';
    document.getElementById('userName').textContent = name;
    if (uni)   { const t=document.getElementById('uniTag');   t.textContent='🏛 '+uni;   t.style.display='inline'; }
    if (major) { const t=document.getElementById('majorTag'); t.textContent='📚 '+major; t.style.display='inline'; }
    if (year)  { const t=document.getElementById('yearTag');  t.textContent='📅 '+year;  t.style.display='inline'; }
    setTimeout(() => { msg.className='msg-box'; document.getElementById('editSection').style.display='none'; }, 2000);
  } catch(e) {
    msg.className = 'msg-box error';
    msg.textContent = '⚠ حدث خطأ، حاول مجدداً';
  }
};

window.doLogout = async function() {
  if (!confirm('تأكيد تسجيل الخروج؟')) return;
  await signOut(auth);
  window.location.href = 'login.html';
};
</script>
</body>
</html>
